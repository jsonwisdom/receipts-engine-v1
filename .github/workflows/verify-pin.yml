name: VerifyReceipt
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install eth-hash
      - run: python3 watchers/verify_batch.py golden-v1-final/receipt.json
      - run: node scripts/pin-receipt-to-pinata.mjs golden-v1-final/receipt.json
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
