name: Phase-3 Older Commit Rebuild Probe

on:
  workflow_dispatch:

jobs:
  older-commit-probe:
    name: probe older commits for canonical artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_SHA256: "9f73ce11d4bc0f9870ee1a9e46d45c9526632b8defd14a7f378f50d0497d3942"
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Probe historical commits
        run: |
          set -euo pipefail
          mkdir -p older-probe
          echo "TARGET_SHA256=$TARGET_SHA256"

          git log --reverse --format='%H' --all -- \
            attestations/phase3-release.json \
            receipts_engine_v1.tar.gz \
            receipts_engine_v1.tar.gz.sha256 > older-probe/candidate_commits.txt

          echo "CANDIDATE_COMMITS_BEGIN"
          cat older-probe/candidate_commits.txt || true
          echo "CANDIDATE_COMMITS_END"

          found=0
          while read -r commit; do
            [ -n "$commit" ] || continue
            echo "PROBING_COMMIT=$commit"
            git checkout --quiet "$commit"
            rm -rf rebuild-probe
            mkdir -p rebuild-probe

            git archive --format=tar.gz --prefix=receipts-engine-v1/ --output=rebuild-probe/candidate_git_archive_prefix.tar.gz "$commit"
            git archive --format=tar --prefix=receipts-engine-v1/ "$commit" | gzip -n -9 > rebuild-probe/candidate_git_archive_prefix_gzip_n9.tar.gz

            tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
              --exclude='.git' --exclude='node_modules' --exclude='rebuild-probe' --exclude='older-probe' --exclude='receipts_engine_v1.tar.gz' \
              -cf rebuild-probe/candidate_tar_epoch.tar .
            gzip -n -9 rebuild-probe/candidate_tar_epoch.tar

            tar --sort=name --mtime='UTC 2026-01-01' --owner=0 --group=0 --numeric-owner \
              --exclude='.git' --exclude='node_modules' --exclude='rebuild-probe' --exclude='older-probe' --exclude='receipts_engine_v1.tar.gz' \
              -cf rebuild-probe/candidate_tar_2026.tar .
            gzip -n -9 rebuild-probe/candidate_tar_2026.tar

            sha256sum rebuild-probe/*.tar.gz | tee "older-probe/hashes-$commit.txt"
            if grep -q "$TARGET_SHA256" "older-probe/hashes-$commit.txt"; then
              echo "OLDER_COMMIT_PROBE_RESULT=MATCH_FOUND"
              echo "MATCH_COMMIT=$commit"
              grep "$TARGET_SHA256" "older-probe/hashes-$commit.txt"
              found=1
              break
            fi
          done < older-probe/candidate_commits.txt

          git checkout --quiet "$GITHUB_SHA"

          if [ "$found" -eq 0 ]; then
            echo "OLDER_COMMIT_PROBE_RESULT=NO_MATCH"
            exit 1
          fi

      - name: Upload older commit probe output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-older-commit-probe-output
          path: older-probe/
