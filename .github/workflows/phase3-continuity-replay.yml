name: Phase-3 Continuity Replay

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "verify-phase3.sh"
      - "verify-anchors.sh"
      - "attestations/phase3-release.json"
      - "receipts_engine_v1.tar.gz"
      - "receipts_engine_v1.tar.gz.sha256"
      - ".github/workflows/phase3-continuity-replay.yml"

jobs:
  replay:
    name: replay phase-3 continuity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ETH_RPC_URL: https://ethereum.publicnode.com
      ENS_NAME: jaywisdom.eth
      ENS_REGISTRY: "0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e"
      ENS_KEY: receipts_engine_v1_sha256
      SHA_FILE: receipts_engine_v1.tar.gz.sha256
      EXPECTED_PHASE3_SHA256: "9f73ce11d4bc0f9870ee1a9e46d45c9526632b8defd14a7f378f50d0497d3942"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ethers
        run: npm install ethers@6

      - name: Verify release attestation and local artifact hash
        run: |
          set -euo pipefail
          echo "EXPECTED_PHASE3_SHA256=$EXPECTED_PHASE3_SHA256"
          python3 -c "import hashlib,json,os; expected=os.environ['EXPECTED_PHASE3_SHA256']; release=json.load(open('attestations/phase3-release.json', encoding='utf-8')); local_sha=hashlib.sha256(open('receipts_engine_v1.tar.gz','rb').read()).hexdigest(); sha_file=open('receipts_engine_v1.tar.gz.sha256', encoding='utf-8').read().strip().split()[0]; print('RELEASE_STATUS=' + release['status']); print('RELEASE_SHA256=' + release['artifact']['sha256']); print('SHA_FILE_VALUE=' + sha_file); print('LOCAL_ARTIFACT_SHA256=' + local_sha); assert release['artifact']['sha256'] == expected; assert sha_file == expected; assert local_sha == expected; print('LOCAL_RELEASE_RESULT=PASS')"

      - name: Verify ENS anchor via ethers
        run: |
          set -euo pipefail
          cat > verify-ens.mjs <<'EOF'
          import { readFileSync } from 'node:fs';
          import { ethers } from 'ethers';

          const ENS_NAME = process.env.ENS_NAME;
          const ENS_REGISTRY = process.env.ENS_REGISTRY;
          const ENS_KEY = process.env.ENS_KEY;
          const SHA_FILE = process.env.SHA_FILE;
          const RPC_URL = process.env.ETH_RPC_URL;

          const provider = new ethers.JsonRpcProvider(RPC_URL);
          const node = ethers.namehash(ENS_NAME);
          const registry = new ethers.Contract(
            ENS_REGISTRY,
            ['function resolver(bytes32 node) view returns (address)'],
            provider
          );
          const resolverAddress = await registry.resolver(node);
          if (!resolverAddress || resolverAddress === ethers.ZeroAddress) {
            throw new Error('Active resolver missing or zero address');
          }
          const resolver = new ethers.Contract(
            resolverAddress,
            ['function text(bytes32 node, string key) view returns (string)'],
            provider
          );
          const onchain = (await resolver.text(node, ENS_KEY)).trim();
          const expected = readFileSync(SHA_FILE, 'utf8').trim().split(/\s+/)[0];
          console.log(`ENS_NAME=${ENS_NAME}`);
          console.log(`ACTIVE_RESOLVER=${resolverAddress}`);
          console.log(`ENS_KEY=${ENS_KEY}`);
          console.log(`EXPECTED_SHA256=${expected}`);
          console.log(`ONCHAIN_VALUE=${onchain}`);
          if (!/^[a-f0-9]{64}$/.test(onchain)) throw new Error('missing_or_invalid_onchain_value');
          if (onchain !== expected) throw new Error('onchain value does not match expected sha256');
          console.log('ENS_RESULT=PASS');
          EOF
          node verify-ens.mjs

      - name: Emit continuity receipt
        run: |
          set -euo pipefail
          python3 -c "import json,os; report={'phase':'PHASE_3','continuity_replay':'SEALED_BY_GITHUB_ACTIONS','canonical_verifier':'verify-phase3.sh','compatibility_verifier':'verify-anchors.sh','expected_sha256':os.environ['EXPECTED_PHASE3_SHA256'],'release_attestation_match':True,'local_artifact_match':True,'sha_file_match':True,'ens_anchor_match':True,'authority':False}; open('continuity_report_phase3.json','w',encoding='utf-8').write(json.dumps(report, indent=2) + '\n'); print(json.dumps(report, indent=2))"

      - name: Upload continuity report
        uses: actions/upload-artifact@v4
        with:
          name: continuity_report_phase3
          path: continuity_report_phase3.json
