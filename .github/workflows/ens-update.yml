name: ENS Update
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install viem
      - run: node scripts/update-ens-records.mjs
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PUBLIC_RESOLVER_ADDRESS: ${{ secrets.PUBLIC_RESOLVER_ADDRESS }}
          RECEIPT_CID: ${{ secrets.RECEIPT_CID }}
          BATCH_ID: ${{ secrets.BATCH_ID }}
          MERKLE_ROOT: ${{ secrets.MERKLE_ROOT }}
          RECEIPT_HASH: ${{ secrets.RECEIPT_HASH }}
