name: Audit Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  audit-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Strict mode validation (dry-run)
        run: |
          echo "🔍 Validating pattern severities (dry-run)..."
          python analysis/rank_report.py --warn-only --dry-run || true

      - name: Run audit on current ref
        run: |
          python analysis/rank_report.py
          cp analysis/high_priority_audits.json head_audit.json

      - name: Emit feedback telemetry
        continue-on-error: true
        run: |
          echo "📊 Generating feedback telemetry..."
          python analysis/rank_report.py --output-feedback || true

      - name: Upload feedback artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit-feedback
          path: analysis/audit_feedback.json

      - name: Generate PR feedback comment
        if: github.event_name == 'pull_request'
        id: feedback_comment
        continue-on-error: true
        run: |
          python .github/scripts/post_feedback_comment.py

      - name: Post PR feedback comment
        if: github.event_name == 'pull_request' && steps.feedback_comment.outputs.comment_body
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.feedback_comment.outputs.comment_body }}
        with:
          script: |
            const body = process.env.COMMENT_BODY;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c => c.body.includes('## 📊 Audit Feedback'));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

      - name: Fetch baseline from main
        run: |
          if git show origin/main:analysis/high_priority_audits.json > baseline_audit.json 2>/dev/null; then
            echo "Loaded baseline from origin/main"
          else
            echo '{"p0_critical":[],"p1_review":[]}' > baseline_audit.json
            echo "No baseline found on origin/main; using empty baseline"
          fi

      - name: Tier-aware diff gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          jq -r '.p0_critical[].artifact, .p1_review[].artifact' baseline_audit.json | sort -u > baseline_artifacts.txt || true
          jq -r '.p0_critical[].artifact, .p1_review[].artifact' head_audit.json | sort -u > head_artifacts.txt

          comm -13 baseline_artifacts.txt head_artifacts.txt > new_artifacts.txt || true
          NEW_COUNT=$(grep -c . new_artifacts.txt || true)

          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail job if blocked
        if: steps.gate.outputs.blocked == 'true'
        run: exit 1
