name: Rebuild Verify Sign Release Artifact

on:
  workflow_dispatch:

jobs:
  release_provenance:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild deterministic artifact
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify checksum
        run: |
          sha256sum -c receipts_engine_v1.tar.gz.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign rebuilt artifact
        run: |
          cosign sign-blob receipts_engine_v1.tar.gz \
            --bundle receipts_engine_v1.tar.gz.sigstore.json \
            --yes

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: release-checksum
          path: receipts_engine_v1.tar.gz.sha256

      - name: Upload sigstore bundle
        uses: actions/upload-artifact@v4
        with:
          name: sigstore-bundle
          path: receipts_engine_v1.tar.gz.sigstore.json
